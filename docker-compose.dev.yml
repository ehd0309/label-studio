services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./deploy/dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - minio

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: label-studio-dev:latest
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data
      - CSRF_TRUSTED_ORIGINS=http://localhost:8090,http://192.168.50.3:8090,https://*.trycloudflare.com,https://ls.3pools.org
      - DISABLE_SIGNUP_WITHOUT_LINK=true
      # Initial admin user (created on first run when no DB exists)
      - USERNAME=${LS_USERNAME:-testuser@cryptolab.co.kr}
      - PASSWORD=${LS_PASSWORD:-Cryptolab1!}
      # MinIO as default file storage
      - MINIO_STORAGE_ENDPOINT=http://minio:9000
      - MINIO_RELATIVE_URL_PREFIX=/data
      # Presigned URL proxy: replace internal MinIO URL with nginx proxy path
      - MINIO_PROXY_PREFIX=/minio-upload
      # Allow uploads up to 11GB (in bytes)
      - DATA_UPLOAD_MAX_MEMORY_SIZE=11811160064
      - MINIO_STORAGE_BUCKET_NAME=label-studio
      - MINIO_STORAGE_ACCESS_KEY=minioadmin
      - MINIO_STORAGE_SECRET_KEY=minioadmin
    volumes:
      - ls-dev-data:/label-studio/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9009"
    restart: unless-stopped
    ports:
      - "9009:9009"
    expose:
      - "9000"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data

  # One-shot container to create the default bucket
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set ls http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing ls/label-studio;
      mc anonymous set download ls/label-studio;
      mc ilm rule add ls/label-studio --expire-days 0 --noncurrent-expire-days 1 2>/dev/null || true;
      echo 'Bucket ready';
      "

volumes:
  ls-dev-data:
  minio-data:
