upstream backend {
    server backend:8080;
}

upstream minio {
    server minio:9000;
}

server {
    listen 8090;
    server_name _;

    client_max_body_size 0;  # unlimited upload size
    proxy_request_buffering off;  # stream directly to backend without temp file

    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_connect_timeout 60;

    # MinIO direct upload proxy (presigned URL)
    location /minio-upload/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, PUT, OPTIONS' always;
        add_header Access-Control-Allow-Headers '*' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://minio/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MinIO file serving (uploaded files via S3 storage)
    location /data/ {
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS' always;
        add_header Access-Control-Allow-Headers '*' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://minio/label-studio/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything -> backend (serves built frontend + API + static)
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
