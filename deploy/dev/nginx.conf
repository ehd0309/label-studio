upstream backend {
    server 127.0.0.1:8085;
}

upstream frontend {
    server 127.0.0.1:8010;
}

upstream minio {
    server 127.0.0.1:9002;
}

server {
    listen 8090;
    server_name _;

    client_max_body_size 0;  # unlimited upload size
    proxy_request_buffering off;  # stream directly to backend without temp file

    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
    proxy_connect_timeout 60;

    # MinIO direct upload proxy (presigned URL)
    location /minio-upload/ {
        # CORS for browser direct upload
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods 'GET, PUT, OPTIONS' always;
        add_header Access-Control-Allow-Headers '*' always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://minio/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MinIO file serving (uploaded files via S3 storage)
    location /data/ {
        # CORS headers for Label Studio editor to load images/audio/video
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, HEAD, OPTIONS';
        add_header Access-Control-Allow-Headers '*';

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://minio/label-studio/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend assets (webpack dev server)
    location /react-app/ {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebSocket for HMR
    location /ws {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # API, admin, static, media -> backend
    location ~ ^/(api|static|admin|django-rq|version|health|metrics|user|projects|tasks|organizations)(/|$) {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # Everything else -> backend
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
